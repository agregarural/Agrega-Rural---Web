<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pedido</title>
    <link rel="stylesheet" href="../css/produtos.css">

</head>

<body>
    <div id="header-placeholder"></div>
    <div id="menu-options"></div>



    <div class="container">

        <h2>GESTÃO DE PRODUTOS</h2>
        <h5>Painel de Controle para gerenciamento dos produtos Pedrocoop</h5>
        <button id="btnNovoProduto">
            <img src="../assets/icons/plus.svg" class="iconBtn">
            <p>NOVO PRODUTO</p>
        </button>

        <div class="containerForm">
            <form id="formulario">
                <label>Nome</label>
                <input type="text" class="inputProduto">
                <label>Categoria</label>
                <input type="text" class="inputProduto">
                <label>Preço</label>
                <input type="text" class="inputProduto">
                <label>Quantidade em Estoque</label>
                <input type="text" class="inputProduto">
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PRODUTO</th>
                        <th>CATEGORIA</th>
                        <th>PREÇO</th>
                        <th>EM ESTOQUE</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-produtos">

                </tbody>
            </table>

        </div>
        <div class="container"></div>

</body>

<script type="module" src="../js/produtos.js"></script>

</html>
