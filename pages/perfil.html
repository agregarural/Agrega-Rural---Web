<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pagamentos</title>
    <link rel="stylesheet" href="../css/perfil.css">

</head>

<body>

    <div class="header">
        <img src="../assets/img/logo.png" class="logo">
        <p class="title">AGREGA RURAL</p>
        <button class="btnHeader">HOME</button>
        <button class="btnHeader">SOBRE NÓS </button>
        <button class="btnHeader">PRODUTOS</button>
        <button class="btnHeader">CONTATOS</button>
    </div>




    <div class="container">
        <div class="TelaLogin" id="idTelaLogin">
            <div id="fazerCadastro">
                <img src="../assets/img/logo.png" id="imgLogo2">
                <p>AGREGA RURAL</p>
                <p>realize seu cadastro e venha fazer parte</p>
                <button class="btn" id="btnToCadastro">Cadastre-se</button>
                <button class="btn" id="btnToCadastroCoop">Cadastre sua cooperativa</button>
            </div>

            <div id="login">
                <p>Entrar com seu login</p>
                <input type="email" class="input" placeholder="E-mail">
                <input type="password" class="input" placeholder="Senha">
                <input type="password" class="input" placeholder="Matricula">
                <button class="btn"><a href="home.html">Fazer Login</a></button>
                <p>Esqueceu a Senha?</p>
            </div>
        </div>


        <div class="TelaCadastro" id="idTelaCadastro">
            <div id="fazerLogin">
                <img src="../assets/img/logo.png" id="imgLogo2">
                <p>AGREGA RURAL</p>
                <p>Já possui conta? Realize seu login!!</p>
                <button class="btn" id="btnToLogin">Faça seu Login</button>
            </div>
            <div id="cadastro">
                <p>Faça seu cadastro</p>
                <input type="name" class="input" placeholder="Nome Completo">
                <input type="cpf" class="input" placeholder="CEP">
                <input type="cpf" class="input" placeholder="E-mail">
                <input type="email" class="input" placeholder="Nome da cooperativa">
                <input type="password" class="input" placeholder="Senha">
                <input type="password" class="input" placeholder="Repita a senha">
                <button class="btn"><a href="home.html">Cadastre-se</a></button>
            </div>
        </div>

        <div class="TelaCadastroCoop" id="idTelaCadastroCoop">
            <div id="fazerLogin">
                <img src="../assets/img/logo.png" id="imgLogo2">
                <p>AGREGA RURAL</p>
                <p>Já possui conta? Realize seu login!!</p>
                <button class="btn" id="btnToLogin2">Faça seu Login</button>
            </div>

            <div id="cadastroCoop">
                <p>Faça seu cadastro (cooperativa)</p>

                <div class="inputsCadastroCoop">

                    <input type="text" class="input" placeholder="Nome da cooperativa" required>
                    <input type="text" class="input" placeholder="CNPJ (apenas números)" required>

                    <input type="email" class="input" placeholder="E-mail de contato" required>
                    <input type="tel" class="input" placeholder="Telefone (com DDD)" required>

                    <input type="text" class="input" placeholder="CEP (apenas números)" required>
                    <input type="text" class="input" placeholder="Logradouro" required>
                    <input type="text" class="input" placeholder="Cidade" required>
                    <input type="text" class="input" placeholder="Estado (UF)" required>

                    <input type="password" class="input" placeholder="Senha" required>
                    <input type="password" class="input" placeholder="Repita a senha" required>

                    <button class="btn"><a href="home.html">Cadastre-se</a></button>
                </div>
            </div>
        </div>

    </div>

</body>


<script src="../js/perfil.js"></script>

</html>
