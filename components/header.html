<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <style>
        .header {
            
            display: flex;
            flex-direction: row;
            align-self: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 1rem;
            background-color: rgb(255, 255, 255);
            padding-right: clamp(1rem, 1rem + 1vw, 2rem);
            padding-left: clamp(1rem, 1rem + 1vw, 2rem);
            margin-left: clamp(50px, 50px + 1vw, 10rem);
            margin-right: clamp(50px, 50px + 1vw, 10rem);

        }

        #logoHeader {

            width: clamp(2rem, 4rem + 1vw, 7rem);
            height: auto;
            order: 1;



        }

        .textHeader {

            font-family: sans-serif;
            font-size: clamp(1rem, 5vw + 0.5rem, 2rem);
            flex-grow: 1;
            flex-shrink: 0;
            order: 1;

        }

        .btnHeader {
            width: clamp(1.5rem, 10vw + 1.5rem, 7rem);
            margin-right: clamp(1rem, 10vw + 1rem, 1.5rem);
            height: auto;
            font-size: clamp(1rem, 0.4vw + 0.1rem, 2rem);
            flex-shrink: 0;
            border: 0px;
            background-color: transparent;
        }

        .divBtnHeader{

            display: flex;
            order: 3;
            flex-wrap: wrap;

        }

        .btnProfile {
            width: clamp(1rem, 0.5rem + 2vw, 5rem);
            height: auto;
            border: 0px;
            border-radius: 5rem;
            background-color: transparent;
            flex-shrink: 0;
            transition: 0.1s;
            order: 4;

        }

        .btnProfile:active {

            transform: scale(0.9)
        }

        #profileImage {
            width: clamp(1rem, 0.5rem + 4vw, 4rem);
            height: auto;
        }



        @media (max-width: 1021px) {

            .header{

                justify-content: center;
            }

            .divBtnHeader{

                order: 4;
                text-align: center;
            }
            .btnProfile{

                order: 3;
            }

       
        }


    </style>

    <header class="header">
        <img src="../assets/img/logoCenter.jpg" id="logoHeader">
        <h1 class="textHeader">Agrega Rural</h1>
        <div class="divBtnHeader">
            <button class="btnHeader">HOME</button>
            <button class="btnHeader"><p class="naoquebra">SOBRE NÓS</p></button>
            <button class="btnHeader">PRODUTOS</button>
            <button class="btnHeader">CONTATO</button>
            
        </div>
        <button class="btnProfile"><img src="../assets/img/perfil.jpg" id="profileImage"></button>
    </header>
</body>


</html>
