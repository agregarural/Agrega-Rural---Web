<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pagamentos</title>
    <link rel="stylesheet" href="perfil.css">
    
</head>

<body>
    <div class="header">
        <img src="img/logo.png" class="logo">
        <p class="title">AGREGA RURAL</p>
        <button class="btnHeader">HOME</button>
        <button class="btnHeader">SOBRE NÓS </button>
        <button class="btnHeader">PRODUTOS</button>
        <button class="btnHeader">CONTATOS</button>
        <button class="btnPerfil"><img class="imgPerfil" src="img/perfil.jpg"></button>
    </div>




    <div class="container">
        <div class="TelaLogin" id="idTelaLogin">
            <div id="fazerCadastro">
                <img src="img/logo.png" id="imgLogo2">
                <p>AGREGA RURAL</p>
                <p>realize seu cadastro e venha fazer parte</p>
                <button class="btn" id="btnToCadastro">Cadastre-se</button>
            </div>

            <div id="login">
                <p>Entrar com seu login</p>
                <input type="email" class="input" placeholder="E-mail">
                <input type="password" class="input" placeholder="Senha">
                <input type="password" class="input" placeholder="Matricula">
                <button class="btn" ><a href="home.html">Fazer Login</a></button>
                <p>Esqueceu a Senha?</p>
            </div>
        </div>


        <div class="TelaCadastro" id="idTelaCadastro">
            <div id="fazerLogin">
                <img src="img/logo.png" id="imgLogo2">
                <p>AGREGA RURAL</p>
                <p>Já possui conta? Realize seu login!!</p>
                <button class="btn" id="btnToLogin">Faça seu Login</button>
            </div>
            <div id="cadastro">
                <p>Entrar com seu login</p>
                <input type="name" class="input" placeholder="Nome Completo">
                <input type="cpf" class="input" placeholder="CEP">
                <input type="email" class="input" placeholder="Nome da cooperativa">
                <input type="password" class="input" placeholder="Senha">
                <input type="password" class="input" placeholder="Repita a senha">
                <button class="btn"><a href="home.html">Cadastre-se</a></button>
                <p>Esqueceu a Senha?</p>
            </div>
        </div>


    </div>

    <div class="rodape">

        <p>RODAPE</p>

        

    </div>

</body>


<script src="perfil.js"></script>

</html>
